<div class="draft-board-container" 
     style="background-color: #1a1a1a; color: white; padding: 40px; height: 100%; width: 100%; display: flex; flex-direction: column; box-sizing: border-box; border-right: 4px solid #00fbff;">
  
  <!-- On the Clock Section -->
  <div class="on-the-clock" style="margin-bottom: 50px;">
    <p style="color: #00fbff; font-weight: bold; letter-spacing: 3px; font-size: 1.2rem; margin-bottom: 20px;">ON THE CLOCK</p>
    <div style="display: flex; align-items: center; gap: 25px;">
      <div style="width: 100px; height: 100px; background: #333; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 3px solid #00fbff;">
        <img src="team-logo-placeholder.png" alt="Logo" id="current-logo" style="width: 80%; height: auto;">
      </div>
      <h2 id="current-team-name" style="font-size: 4rem; margin: 0; text-transform: uppercase;">Lakers</h2>
    </div>
  </div>

  <!-- Queue / Up Next Section -->
  <div class="draft-queue" style="flex-grow: 1; border-top: 2px solid #333; padding-top: 30px;">
    <p style="color: #888; font-weight: bold; letter-spacing: 2px; font-size: 1.1rem; margin-bottom: 20px;">UP NEXT</p>
    <ul id="team-queue" style="list-style: none; padding: 0; margin: 0;">
      <!-- Increased font size and white color for better visibility -->
      <li style="font-size: 2.2rem; padding: 15px 0; color: #ffffff; border-bottom: 1px solid #222; font-weight: 500;">2. Celtics</li>
      <li style="font-size: 2.2rem; padding: 15px 0; color: #ffffff; border-bottom: 1px solid #222; font-weight: 500;">3. Warriors</li>
      <li style="font-size: 2.2rem; padding: 15px 0; color: #ffffff; border-bottom: 1px solid #222; font-weight: 500;">4. Heat</li>
    </ul>
  </div>
</div>
