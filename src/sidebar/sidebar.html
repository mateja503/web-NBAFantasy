<mat-sidenav-container>
  <mat-sidenav #sidenav mode="side" opened>
    <ul class="sidebar-content">
      <li routerLink="/home">Home</li>
      <li>Players</li>
      <li routerLink="/team">Teams</li>
      <!-- <li routerLink="/league">Leagues</li> -->
      <mat-accordion>
        <mat-expansion-panel hideToggle>
            <mat-expansion-panel-header>
              <mat-panel-title>League</mat-panel-title>
            </mat-expansion-panel-header>
          <ul class="submenu">
            <li routerLink="/league/create">Create League</li>
            <li routerLink="/league/join">Join League</li>
          </ul>
        </mat-expansion-panel>
      </mat-accordion>


      <li>Games</li>
      <li routerLink="/draft">Draft</li>
      <li routerLink="/trade">Trade</li>
      <li>FreeAgency</li>
      <li routerLink="/chatroom">ChatRoom</li>
    </ul>
  </mat-sidenav>
  <mat-sidenav-content>
    <div class="sidebar-toggle" (click)="sidenav.toggle()"><mat-icon>list</mat-icon></div>
  </mat-sidenav-content>
</mat-sidenav-container>
