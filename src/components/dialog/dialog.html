<h2 mat-dialog-title>Hi {{data.name}}</h2>
<mat-dialog-content>
  <p>What's your favorite animal?</p>
  
  <mat-form-field>
    <mat-label>Favorite Animal</mat-label>
    <input matInput placeholder="Enter Team Name" [(ngModel)]="animal" />
  </mat-form-field>
</mat-dialog-content>
<mat-dialog-actions>
    <app-button label="No Thanks" (click)="onNoClick()"></app-button>
  <!-- <button matButton (click)="onNoClick()">No Thanks</button> -->
<app-button label="Join League" (click)="onYesClick()"></app-button>
  <!-- <button matButton [mat-dialog-close]="animal()" cdkFocusInitial>Ok</button> -->
</mat-dialog-actions>
